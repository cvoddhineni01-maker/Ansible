- name: variables from promt 
  hosts: localhost
  connection: local
  vars_prompt: 
    - name: username
      prompt: "whats the username?"
      private: false
    - name: password
      prompt: "whats your password?"
      private: true

  tasks:
    - name: Ansible Course
      vars:
        #Course: "AWS"
      ansible.builtin.debug:
        msg: "username name is: {{ username }}, password is {{ password }}"
 