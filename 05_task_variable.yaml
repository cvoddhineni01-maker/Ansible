- name: play level variables
  hosts: localhost
  connection: localhost
  vars: 
    Course: AWS with Devops
    Duration: 120 hrs
    Trainers: Shiva
  tasks:
    Course: Ansible
  - name: print the course info
    ansible.builtin.debug:
      msg: "Course name is: {{ Course }} , Duration is: {{ Duration }} , Trainer is: {{Trainers}}"